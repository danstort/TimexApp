services:
  postgres:
    image: postgres:18-alpine
    container_name: timex-postgres
    environment:
      POSTGRES_DB: timex
      POSTGRES_USER: timex
      POSTGRES_PASSWORD: timex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timex -d timex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
